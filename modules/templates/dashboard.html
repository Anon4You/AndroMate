<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AndroMate · AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-card">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-robot"></i></div>
                <div class="logo-text">
                    <h2>AndroMate</h2>
                    <p>local · private · fast</p>
                </div>
            </div>
            <div class="status-panel">
                <div class="status-item">
                    <div class="status-icon"><i class="fas fa-bolt"></i></div>
                    <div class="status-info">
                        <div class="status-label">Battery</div>
                        <div class="status-value" id="batteryValue"><small>—</small></div>
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-icon"><i class="fas fa-wifi"></i></div>
                    <div class="status-info">
                        <div class="status-label">WiFi</div>
                        <div class="status-value" id="wifiValue">—</div>
                    </div>
                </div>
            </div>
            <div class="tip-box">
                <i class="fas fa-lightbulb"></i>
                <p><strong>Try:</strong> "battery level", "open YouTube", "take a selfie", "send email", "generate image"</p>
            </div>
        </div>

        <!-- Main chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-header-left">
                    <i class="fas fa-comment-dots" style="color: var(--accent-primary);"></i>
                    <h3>Conversation</h3>
                    <span class="status-dot" title="Online"></span>
                </div>
                <div class="chat-header-actions">
                    <button class="header-btn" onclick="clearChat()" title="Clear chat"><i class="fas fa-trash"></i></button>
                    <button class="header-btn" onclick="window.scrollTo(0,0)" title="Settings"><i class="fas fa-cog"></i></button>
                </div>
            </div>

            <div class="messages-container" id="chat">
                <!-- Messages inserted via JS -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="command" placeholder="Type a message..." autofocus>
                    <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const commandInput = document.getElementById('command');
        const sendBtn = document.getElementById('sendBtn');
        const batterySpan = document.getElementById('batteryValue');
        const wifiSpan = document.getElementById('wifiValue');
        let isTyping = false;

        // Add message to chat
        function addMessage(sender, text, isError = false) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.innerHTML = sender === 'assistant' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}${isError ? ' error' : ''}`;

            // Parse markdown-like syntax
            let formattedText = text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code style="background:rgba(99,102,241,0.2);padding:2px 6px;border-radius:4px;">$1</code>')
                .replace(/\n/g, '<br>');
            bubble.innerHTML = formattedText;

            const time = document.createElement('div');
            time.className = 'timestamp';
            time.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            bubble.appendChild(time);

            if (sender === 'assistant') {
                row.appendChild(avatar);
                row.appendChild(bubble);
            } else {
                row.appendChild(bubble);
                row.appendChild(avatar);
            }
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        }

        // Add image message
        function addImageMessage(imageUrl) {
            const row = document.createElement('div');
            row.className = 'message-row assistant';

            const avatar = document.createElement('div');
            avatar.className = 'avatar assistant';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            bubble.className = 'bubble assistant';

            const img = document.createElement('img');
            img.src = imageUrl;
            img.style.maxWidth = '100%';
            img.style.borderRadius = '12px';
            img.style.marginBottom = '8px';
            img.onerror = () => {
                bubble.innerHTML += '<br><small style="color:var(--error)">Image failed to load</small>';
            };
            bubble.appendChild(img);

            const time = document.createElement('div');
            time.className = 'timestamp';
            time.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            bubble.appendChild(time);

            row.appendChild(avatar);
            row.appendChild(bubble);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            if (isTyping) return;
            isTyping = true;

            const row = document.createElement('div');
            row.className = 'message-row assistant';
            row.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar assistant';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            row.appendChild(avatar);
            row.appendChild(indicator);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        }

        // Remove typing indicator
        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
            isTyping = false;
        }

        // Clear chat
        function clearChat() {
            chat.innerHTML = '';
            addMessage('assistant', 'Chat cleared. How can I help you?');
        }

        // Initial welcome
        addMessage('assistant', 'Hello! I\'m **AndroMate**. How can I assist you today?');

        // Send command
        async function sendCommand() {
            const cmd = commandInput.value.trim();
            if (!cmd) return;

            addMessage('user', cmd);
            commandInput.value = '';
            commandInput.disabled = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await response.json();

                hideTyping();

                if (data.error) {
                    addMessage('assistant', `Error: ${data.error}`, true);
                } else {
                    if (data.image) {
                        addImageMessage(data.image);
                    }
                    const output = data.output.trim();
                    if (output) {
                        addMessage('assistant', output);
                    } else if (!data.image) {
                        addMessage('assistant', 'Done.');
                    }
                }
            } catch (e) {
                hideTyping();
                addMessage('assistant', `Network error: ${e.message}`, true);
            } finally {
                commandInput.disabled = false;
                sendBtn.disabled = false;
                commandInput.focus();
            }
        }

        // Update status
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                if (data.battery !== undefined && data.battery !== 'unknown') {
                    batterySpan.innerHTML = `${data.battery}%`;
                } else {
                    batterySpan.innerHTML = '<small>—</small>';
                }

                if (data.wifi && data.wifi !== 'unknown' && data.wifi !== 'error') {
                    wifiSpan.innerText = data.wifi;
                } else {
                    wifiSpan.innerText = 'Not connected';
                }
            } catch (e) {
                batterySpan.innerHTML = '<small>—</small>';
                wifiSpan.innerText = '—';
            }
        }

        sendBtn.addEventListener('click', sendCommand);
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        updateStatus();
        setInterval(updateStatus, 30000);
    </script>
</body>
</html>
